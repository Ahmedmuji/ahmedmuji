<svg viewBox="0 0 1200 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8EEFF"/>
      <stop offset="100%" stop-color="#C9A8FF"/>
    </linearGradient>
    <style>
      .bit { font-family: "Fira Code", Consolas, monospace; font-weight: 700; opacity: .62; }
      .soft { opacity: .34; }
      .bright { opacity: .82; }
      .purple { fill: #A855F7; }
      .lavender { fill: #B28AD8; }
      .pink { fill: #DDA0C8; }
      .float { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .slow { animation-duration: 8s; }
      .delay1 { animation-delay: -1.5s; }
      .delay2 { animation-delay: -3s; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(6deg); }
      }
    </style>
  </defs>

  <text class="bit purple float bright" x="70" y="150" font-size="18">0</text>
  <text class="bit lavender float delay1" x="145" y="185" font-size="13">1</text>
  <text class="bit pink float slow" x="230" y="108" font-size="16">0</text>
  <text class="bit purple float delay2 soft" x="330" y="135" font-size="12">1</text>
  <text class="bit lavender float" x="440" y="78" font-size="18">0</text>
  <text class="bit purple float delay1" x="520" y="112" font-size="20">1</text>
  <text class="bit pink float slow delay2" x="660" y="95" font-size="14">0</text>
  <text class="bit lavender float" x="735" y="165" font-size="13">1</text>
  <text class="bit purple float delay1 bright" x="840" y="90" font-size="19">0</text>
  <text class="bit pink float delay2" x="950" y="142" font-size="15">1</text>
  <text class="bit purple float slow" x="1045" y="82" font-size="17">0</text>
  <text class="bit lavender float delay1 soft" x="1120" y="178" font-size="12">1</text>
  <text class="bit purple float delay2 soft" x="170" y="245" font-size="12">0</text>
  <text class="bit lavender float slow" x="370" y="250" font-size="15">1</text>
  <text class="bit purple float delay1" x="790" y="240" font-size="16">0</text>
  <text class="bit pink float delay2 soft" x="1010" y="255" font-size="12">1</text>

  <text x="50%" y="56%" text-anchor="middle" font-family="Fira Code, Consolas, monospace"
        font-size="44" font-weight="700" fill="url(#nameGrad)">Ahmed Mujtaba</text>
  <text x="50%" y="68%" text-anchor="middle" font-family="Fira Code, Consolas, monospace"
        font-size="17" fill="#D8C6FF" opacity="0.92">AI Engineer - FAST University Graduate</text>
</svg>
