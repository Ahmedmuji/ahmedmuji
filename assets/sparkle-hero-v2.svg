<svg viewBox="0 0 1200 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8EEFF"/>
      <stop offset="100%" stop-color="#C9A8FF"/>
    </linearGradient>
    <g id="sparkle">
      <rect x="10" y="0" width="10" height="10"/>
      <rect x="0" y="10" width="10" height="10"/>
      <rect x="10" y="10" width="10" height="10"/>
      <rect x="20" y="10" width="10" height="10"/>
      <rect x="10" y="20" width="10" height="10"/>
    </g>
    <style>
      .pink { fill: #DDA0C8; }
      .purple { fill: #B28AD8; }
      .gold { fill: #DCCD72; }
      .float { animation: float 5.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .slow { animation-duration: 7s; }
      .delay1 { animation-delay: -1.4s; }
      .delay2 { animation-delay: -2.8s; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: .82; }
        50% { transform: translateY(-10px) rotate(9deg); opacity: 1; }
      }
    </style>
  </defs>

  <use href="#sparkle" class="pink float" x="55" y="145" transform="rotate(28 70 160)"/>
  <use href="#sparkle" class="purple float delay1" x="140" y="170" transform="rotate(-18 155 185)"/>
  <use href="#sparkle" class="gold float slow" x="220" y="105" transform="rotate(43 235 120)"/>
  <use href="#sparkle" class="purple float delay2" x="350" y="125" transform="rotate(0 365 140)"/>
  <use href="#sparkle" class="pink float slow delay1" x="455" y="70" transform="rotate(20 470 85)"/>
  <use href="#sparkle" class="gold float delay2" x="535" y="82" transform="rotate(23 550 97)"/>
  <use href="#sparkle" class="purple float" x="660" y="155" transform="rotate(0 675 170)"/>
  <use href="#sparkle" class="gold float slow delay1" x="790" y="140" transform="rotate(0 805 155)"/>
  <use href="#sparkle" class="purple float delay2" x="910" y="105" transform="rotate(0 925 120)"/>
  <use href="#sparkle" class="pink float slow" x="1000" y="80" transform="rotate(-18 1015 95)"/>
  <use href="#sparkle" class="pink float delay1" x="1120" y="165" transform="rotate(24 1135 180)"/>

  <text x="50%" y="56%" text-anchor="middle" font-family="Fira Code, Consolas, monospace"
        font-size="44" font-weight="700" fill="url(#nameGrad)">Ahmed Mujtaba</text>
  <text x="50%" y="68%" text-anchor="middle" font-family="Fira Code, Consolas, monospace"
        font-size="17" fill="#D8C6FF" opacity="0.92">AI Engineer - FAST University Graduate</text>
</svg>
