  </g>
  <g>
    <text class="p1" x="1110" y="45" font-size="15">0</text>
    <animateTransform attributeName="transform" type="translate" values="0,-95;0,115" dur="14s" begin="-11s" repeatCount="indefinite"/>
  </g>
