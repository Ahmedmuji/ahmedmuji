<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5EDFF"/>
      <stop offset="100%" stop-color="#C9A8FF"/>
    </linearGradient>
    <g id="sparkle">
      <rect x="10" y="0" width="10" height="10"/>
      <rect x="0" y="10" width="10" height="10"/>
      <rect x="10" y="10" width="10" height="10"/>
      <rect x="20" y="10" width="10" height="10"/>
      <rect x="10" y="20" width="10" height="10"/>
    </g>
    <style>
      .pink { fill: #DDA0C8; }
      .purple { fill: #B28AD8; }
      .gold { fill: #DCCD72; }
      .float { animation: float 5.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .slow { animation-duration: 7s; }
      .delay1 { animation-delay: -1.4s; }
      .delay2 { animation-delay: -2.8s; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: .82; }
        50% { transform: translateY(-10px) rotate(9deg); opacity: 1; }
      }
    </style>
  </defs>

  <g opacity="0.95">
    <use href="#sparkle" class="pink float" x="65" y="132" transform="rotate(28 80 147)"/>
    <use href="#sparkle" class="purple float delay1" x="150" y="175" transform="rotate(-18 165 190)"/>
    <use href="#sparkle" class="gold float slow" x="245" y="110" transform="rotate(43 260 125)"/>
    <use href="#sparkle" class="purple float delay2" x="365" y="155" transform="rotate(0 380 170)"/>
    <use href="#sparkle" class="pink float slow delay1" x="455" y="62" transform="rotate(20 470 77)"/>
    <use href="#sparkle" class="gold float delay2" x="535" y="72" transform="rotate(23 550 87)"/>
    <use href="#sparkle" class="purple float" x="650" y="148" transform="rotate(0 665 163)"/>
    <use href="#sparkle" class="gold float slow delay1" x="810" y="145" transform="rotate(0 825 160)"/>
    <use href="#sparkle" class="purple float delay2" x="925" y="106" transform="rotate(0 940 121)"/>
    <use href="#sparkle" class="pink float slow" x="1005" y="78" transform="rotate(-18 1020 93)"/>
    <use href="#sparkle" class="pink float delay1" x="1120" y="170" transform="rotate(24 1135 185)"/>
  </g>

  <text x="50%" y="57%" text-anchor="middle" font-family="Fira Code, Consolas, monospace"
        font-size="44" font-weight="700" fill="url(#nameGrad)">Ahmed Mujtaba</text>
  <text x="50%" y="69%" text-anchor="middle" font-family="Fira Code, Consolas, monospace"
        font-size="17" fill="#D8C6FF" opacity="0.92">AI Engineer - FAST University Graduate</text>
</svg>
