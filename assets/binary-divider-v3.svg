<svg viewBox="0 0 1200 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bit { font-family: "Fira Code", Consolas, monospace; font-weight: 700; opacity: .58; }
      .soft { opacity: .32; }
      .bright { opacity: .8; }
      .purple { fill: #A855F7; }
      .lavender { fill: #B28AD8; }
      .pink { fill: #DDA0C8; }
      .float { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .delay1 { animation-delay: -1.7s; }
      .delay2 { animation-delay: -3.2s; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(-5deg); }
      }
    </style>
  </defs>
  <text class="bit purple float bright" x="55" y="90" font-size="16">1</text>
  <text class="bit lavender float delay1" x="130" y="55" font-size="12">0</text>
  <text class="bit pink float delay2" x="250" y="115" font-size="15">1</text>
  <text class="bit purple float soft" x="370" y="45" font-size="11">0</text>
  <text class="bit lavender float delay1" x="515" y="98" font-size="18">1</text>
  <text class="bit purple float delay2 soft" x="655" y="50" font-size="12">0</text>
  <text class="bit pink float" x="800" y="118" font-size="15">1</text>
  <text class="bit lavender float delay1 bright" x="930" y="62" font-size="17">0</text>
  <text class="bit purple float delay2" x="1085" y="105" font-size="14">1</text>
</svg>
