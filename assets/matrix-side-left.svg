<svg viewBox="0 0 90 1650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="sparkle">
      <rect x="10" y="0" width="10" height="10"/>
      <rect x="0" y="10" width="10" height="10"/>
      <rect x="10" y="10" width="10" height="10"/>
      <rect x="20" y="10" width="10" height="10"/>
      <rect x="10" y="20" width="10" height="10"/>
    </g>
    <style>
      .pink { fill: #DDA0C8; }
      .purple { fill: #B28AD8; }
      .gold { fill: #DCCD72; }
      .float { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .slow { animation-duration: 8s; }
      .delay1 { animation-delay: -1.5s; }
      .delay2 { animation-delay: -3s; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: .78; }
        50% { transform: translateY(-12px) rotate(10deg); opacity: 1; }
      }
    </style>
  </defs>
  <use href="#sparkle" class="pink float" x="48" y="40" transform="rotate(30 63 55)"/>
  <use href="#sparkle" class="purple float delay1" x="20" y="178" transform="rotate(-14 35 193)"/>
  <use href="#sparkle" class="gold float slow" x="55" y="318" transform="rotate(20 70 333)"/>
  <use href="#sparkle" class="purple float delay2" x="10" y="438" transform="rotate(0 25 453)"/>
  <use href="#sparkle" class="gold float delay1" x="50" y="575" transform="rotate(-12 65 590)"/>
  <use href="#sparkle" class="pink float slow delay2" x="28" y="690" transform="rotate(24 43 705)"/>
  <use href="#sparkle" class="purple float" x="58" y="812" transform="rotate(-20 73 827)"/>
  <use href="#sparkle" class="gold float slow delay1" x="18" y="942" transform="rotate(20 33 957)"/>
  <use href="#sparkle" class="pink float delay2" x="54" y="1078" transform="rotate(-14 69 1093)"/>
  <use href="#sparkle" class="purple float slow" x="20" y="1215" transform="rotate(30 35 1230)"/>
  <use href="#sparkle" class="gold float delay1" x="55" y="1378" transform="rotate(18 70 1393)"/>
  <use href="#sparkle" class="pink float delay2" x="30" y="1510" transform="rotate(-18 45 1525)"/>
</svg>
