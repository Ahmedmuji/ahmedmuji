<svg viewBox="0 0 90 1650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="sparkle">
      <rect x="10" y="0" width="10" height="10"/>
      <rect x="0" y="10" width="10" height="10"/>
      <rect x="10" y="10" width="10" height="10"/>
      <rect x="20" y="10" width="10" height="10"/>
      <rect x="10" y="20" width="10" height="10"/>
    </g>
    <style>
      .pink { fill: #DDA0C8; }
      .purple { fill: #B28AD8; }
      .gold { fill: #DCCD72; }
      .float { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .slow { animation-duration: 8s; }
      .delay1 { animation-delay: -1.5s; }
      .delay2 { animation-delay: -3s; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: .78; }
        50% { transform: translateY(-12px) rotate(-10deg); opacity: 1; }
      }
    </style>
  </defs>
  <use href="#sparkle" class="purple float delay1" x="18" y="85" transform="rotate(0 33 100)"/>
  <use href="#sparkle" class="pink float" x="55" y="205" transform="rotate(-20 70 220)"/>
  <use href="#sparkle" class="gold float slow delay2" x="30" y="342" transform="rotate(0 45 357)"/>
  <use href="#sparkle" class="purple float" x="60" y="480" transform="rotate(18 75 495)"/>
  <use href="#sparkle" class="pink float delay1" x="25" y="620" transform="rotate(-14 40 635)"/>
  <use href="#sparkle" class="gold float slow" x="56" y="750" transform="rotate(20 71 765)"/>
  <use href="#sparkle" class="purple float delay2" x="18" y="870" transform="rotate(-22 33 885)"/>
  <use href="#sparkle" class="pink float slow" x="50" y="1008" transform="rotate(26 65 1023)"/>
  <use href="#sparkle" class="gold float delay1" x="20" y="1145" transform="rotate(-14 35 1160)"/>
  <use href="#sparkle" class="purple float" x="56" y="1278" transform="rotate(0 71 1293)"/>
  <use href="#sparkle" class="pink float delay2" x="24" y="1418" transform="rotate(20 39 1433)"/>
  <use href="#sparkle" class="gold float slow delay1" x="54" y="1532" transform="rotate(-20 69 1547)"/>
</svg>
