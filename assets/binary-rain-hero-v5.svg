<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7ECFF"/>
      <stop offset="100%" stop-color="#C8A2FF"/>
    </linearGradient>
    <style>
      text { font-family: "Fira Code", Consolas, monospace; font-weight: 700; }
      .bit1 { fill: #A855F7; opacity: .8; }
      .bit2 { fill: #C9A8FF; opacity: .52; }
      .bit3 { fill: #E9D5FF; opacity: .34; }
      .title { fill: url(#nameGrad); }
      .subtitle { fill: #D8C6FF; opacity: .92; }
    </style>
  </defs>

  <g>
    <text class="bit2" x="70" y="32" font-size="18">0</text>
    <text class="bit3" x="118" y="78" font-size="14">1</text>
    <text class="bit1" x="160" y="128" font-size="28">0</text>
    <animateTransform attributeName="transform" type="translate" values="0,-150;0,330" dur="11s" begin="-2s" repeatCount="indefinite"/>
  </g>
  <g>
    <text class="bit1" x="295" y="56" font-size="15">1</text>
    <text class="bit2" x="345" y="118" font-size="25">0</text>
    <text class="bit3" x="390" y="202" font-size="13">1</text>
    <animateTransform attributeName="transform" type="translate" values="0,-180;0,330" dur="15s" begin="-9s" repeatCount="indefinite"/>
  </g>
  <g>
    <text class="bit3" x="500" y="42" font-size="13">0</text>
    <text class="bit1" x="545" y="120" font-size="22">1</text>
    <text class="bit2" x="585" y="218" font-size="16">0</text>
    <animateTransform attributeName="transform" type="translate" values="0,-170;0,325" dur="13s" begin="-5s" repeatCount="indefinite"/>
  </g>
  <g>
    <text class="bit2" x="720" y="50" font-size="18">1</text>
    <text class="bit3" x="780" y="130" font-size="14">0</text>
    <text class="bit1" x="830" y="222" font-size="15">1</text>
    <animateTransform attributeName="transform" type="translate" values="0,-200;0,320" dur="16s" begin="-11s" repeatCount="indefinite"/>
  </g>
  <g>
    <text class="bit1" x="955" y="35" font-size="21">0</text>
    <text class="bit2" x="1015" y="112" font-size="15">1</text>
    <text class="bit3" x="1080" y="210" font-size="24">0</text>
    <animateTransform attributeName="transform" type="translate" values="0,-160;0,335" dur="14s" begin="-7s" repeatCount="indefinite"/>
  </g>

  <text class="title" x="50%" y="54%" text-anchor="middle" font-size="52">Ahmed Mujtaba</text>
  <text class="subtitle" x="50%" y="67%" text-anchor="middle" font-size="18">AI Engineer - FAST University Graduate</text>
</svg>
